<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>分层金融因果图</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>分层金融因果图</h1>
      <p class="subtitle">
        左侧为<strong>节点详情与机制链</strong>；中间为自上而下三层<strong>立体圆盘</strong>（中盘与底盘加大、竖直拉开；机制为小框紧包文字、分散无重叠）；右侧<strong>具体事件</strong>更窄、贴右、每行 3
        个。数据来自 <code>graph_data/</code>。
      </p>
    </header>

    <main class="main-grid">
      <aside class="side-panel" aria-label="节点详情与机制链">
        <div id="detail-panel" class="panel-block">
          <h2>节点详情</h2>
          <div id="detail-content" class="muted">点击图中任意节点</div>
        </div>
        <div id="chain-panel" class="panel-block">
          <h2>机制链</h2>
          <div id="chain-content" class="muted">选中具体事件后显示</div>
        </div>
        <div id="news-actions" class="panel-block hidden">
          <button type="button" id="btn-news" class="btn-primary">查看原始新闻</button>
        </div>
      </aside>

      <section class="canvas-wrap" aria-label="主分层图">
        <div class="svg-scroll">
          <svg id="layer-graph" xmlns="http://www.w3.org/2000/svg" role="img">
            <defs>
              <marker
                id="arrow-end"
                viewBox="0 0 10 10"
                refX="8.5"
                refY="5"
                markerWidth="7"
                markerHeight="7"
                orient="auto"
              >
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
              </marker>
            </defs>
            <g id="edges-layer"></g>
            <g id="nodes-layer"></g>
          </svg>
        </div>
        <div class="layer-legend">
          <span class="lg lg-root">顶盘 · 货币政策</span>
          <span class="lg lg-l2">中盘 · 九类政策</span>
          <span class="lg lg-l1">底盘 · 机制（分散）</span>
          <span class="lg lg-l0">右侧 · 具体事件 ×3</span>
        </div>
      </section>
    </main>

    <div id="time-drawer" class="drawer" aria-hidden="true">
      <div class="drawer-backdrop" id="time-drawer-backdrop"></div>
      <div class="drawer-panel">
        <div class="drawer-header">
          <h2 id="time-drawer-title">时间线</h2>
          <button type="button" class="btn-close" id="time-drawer-close" aria-label="关闭">×</button>
        </div>
        <div id="time-drawer-body" class="drawer-body"></div>
      </div>
    </div>

    <div id="news-modal" class="modal" aria-hidden="true">
      <div class="modal-backdrop" id="news-modal-backdrop"></div>
      <div class="modal-panel" role="dialog" aria-labelledby="news-modal-title">
        <div class="modal-header">
          <h2 id="news-modal-title">原始新闻</h2>
          <button type="button" class="btn-close" id="news-modal-close" aria-label="关闭">×</button>
        </div>
        <div id="news-modal-body" class="modal-body"></div>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
